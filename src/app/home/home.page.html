<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title> Trending Movies </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (isLoading()) {
  <app-loading-skeleton></app-loading-skeleton>
  } @else if (error()) {
  <app-error-banner
    [errorMessage]="error()"
    [retry]="loadMovies"
  ></app-error-banner>
  } @else {
  <ion-list>
    @for (movie of movies(); track movie.id) {
    <ion-item :key="key">
      <ion-label>{{ movie.title }}</ion-label>
    </ion-item>
    }
  </ion-list>
  }
</ion-content>
