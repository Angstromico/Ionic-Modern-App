<app-main-header />

<ion-content [fullscreen]="true">
  @if (isLoading()) {
  <app-loading-skeleton />
  } @else if (error()) {
  <app-error-banner [errorMessage]="error()" [retry]="loadMovies" />
  } @else {
  <app-movie-list [movies]="movies()" (movieClick)="openMovieModal($event)" />

  <app-pagination
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [isLoading]="isLoading()"
    (pageChange)="onPageChange($event)"
  />
  }
</ion-content>
