<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title> Trending Movies </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (isLoading()) {
  <app-loading-skeleton />
  } @else if (error()) {
  <app-error-banner [errorMessage]="error()" [retry]="loadMovies" />
  } @else {
  <app-movie-list [movies]="movies()" />
  }
</ion-content>
