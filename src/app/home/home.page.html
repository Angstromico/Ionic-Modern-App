<app-main-header />

<ion-content [fullscreen]="true">
  @if (isLoading()) {
  <app-loading-skeleton />
  } @else if (error()) {
  <app-error-banner [errorMessage]="error()" [retry]="loadMovies" />
  } @else {
  <app-movie-list [movies]="movies()" (movieClick)="openMovieModal($event)" />

  <!-- Pagination Component (shown when pagination mode is active) -->
  @if (usePagination()) {
  <app-pagination
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [isLoading]="isLoading()"
    (pageChange)="onPageChange($event)"
  />
  }

  <!-- Infinite Scroll -->
  @if (!usePagination()) {
  <ion-infinite-scroll (ionInfinite)="loadMoreMovies($event)">
    <ion-spinner name="dots"></ion-spinner>
  </ion-infinite-scroll>
  } }

  <!-- Toggle Button -->
  <div class="toggle-container">
    <ion-button
      [color]="usePagination() ? 'primary' : 'medium'"
      fill="solid"
      shape="round"
      size="small"
      (click)="togglePaginationMode()"
      class="toggle-btn"
    >
      <ion-icon
        [name]="usePagination() ? 'infinite-outline' : 'grid-outline'"
        slot="start"
      ></ion-icon>
      {{ usePagination() ? 'Infinite Scroll' : 'Pagination' }}
    </ion-button>
  </div>
</ion-content>
